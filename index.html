<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario de Productos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <header>
            <h1>📦 Sistema de Inventario de Productos</h1>
            <p>Programación Front End - Evaluación Sumativa 2</p>
        </header>

        <section class="formulario">

            <h2>Agregar Producto</h2>

            <form id="formProducto">

                <div class="grupo">

                    <label for="nombre">Nombre del producto</label>

                    <input
                        type="text"
                        id="nombre"
                        placeholder="Ejemplo: Mouse Gamer">

                </div>

                <div class="grupo">

                    <label for="precio">Precio</label>

                    <input
                        type="number"
                        id="precio"
                        placeholder="Ejemplo: 25000">

                </div>

                <div class="grupo">

                    <label for="categoria">Categoría</label>

                    <select id="categoria">

                        <option value="">Seleccione una categoría</option>
                        <option>Tecnología</option>
                        <option>Hogar</option>
                        <option>Oficina</option>
                        <option>Accesorios</option>

                    </select>

                </div>

                <button type="submit">
                    Agregar Producto
                </button>

            </form>

            <p id="mensaje"></p>

        </section>

        <section class="busqueda">

            <h2>Buscar Producto</h2>

            <input
                type="text"
                id="buscar"
                placeholder="Escriba el nombre del producto">

        </section>

        <section class="estadisticas">

            <div class="tarjeta">
                <h3>Total Productos</h3>
                <span id="totalProductos">0</span>
            </div>

            <div class="tarjeta">
                <h3>Valor Total</h3>
                <span>$ <span id="valorTotal">0</span></span>
            </div>

        </section>

        <section>

            <h2>Inventario</h2>

            <table>

                <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Acción</th>

                    </tr>

                </thead>

                <tbody id="tablaProductos">

                </tbody>

            </table>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
